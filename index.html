<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Aniversário - 2 Anos</title>
    <style>
        :root {
            --text-color: #e0e0e0;
            --accent-color: #bb86fc; 
            --accent-glow: rgba(187, 134, 252, 0.6);
            --glass-bg: rgba(30, 30, 30, 0.5);
            --glass-border: rgba(187, 134, 252, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Fundo Animado Gradiente */
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        #star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2001; /* Aumentamos para ficar acima do overlay (2000) */
            pointer-events: none; /* ESSENCIAL: para você conseguir clicar no botão por baixo das estrelas */
            background: transparent; /* Removemos o fundo sólido daqui para não tapar o overlay */
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Estilo da Lua Crescente em CSS Puro */
        .lua {
            position: fixed; /* Fixed garante que ela ignore o scroll e fique na tela */
            top: 30vh;        /* 5% de distância do topo */
            right: 40vw;      /* 5% de distância da direita */
            width: 60px;
            height: 60px;
            background-color: transparent;
            border-radius: 50%;
            /* Sombra interna que forma o desenho da lua */
            box-shadow: inset 12px 0px 0px 0px #e0e0e0; 
            filter: drop-shadow(0 0 15px rgba(187, 134, 252, 0.5));
            opacity: 0.9;
            z-index: 1;      /* Mantém no mesmo nível das estrelas */
            pointer-events: none;
            animation: flutuarLua 6s ease-in-out infinite;
        }

            /* Os corações que saem da lua */
            .coracao-lua {
                position: absolute;
                color: var(--accent-color);
                text-shadow: 0 0 5px var(--accent-glow);
                pointer-events: none;
                z-index: 11;
                font-size: 12px;
            }

        /* Tela de Entrada (Overlay) */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        #overlay h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-entrar {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 0 10px var(--glass-border);
        }

        .btn-entrar:hover {
            background: var(--accent-color);
            color: #121212;
            box-shadow: 0 0 20px var(--accent-color);
        }

        main {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            opacity: 0; /* Começa invisível até clicar no botão */
            transition: opacity 1s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        h1, h2 {
            text-align: center;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Mensagem */
        .message-text {
            font-size: 1.1rem;
            text-align: center;
            line-height: 1.8;
            font-style: italic;
        }

        /* Timer */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .time-box {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 5px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(187, 134, 252, 0.1);
        }

        .time-box span {
            display: block;
            font-size: 1.7rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .time-box p {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #aaa;
        }

        /* Coração flutuante do contador */
        .heart-float {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 0);
            pointer-events: none;
            animation: heartUp 1s ease-out forwards;
            font-size: 1.2rem;
        }

        @keyframes heartUp {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -40px) scale(1.5); opacity: 0; }
        }

        /* Carrossel */
        .carousel {
            position: relative;
            width: 100%;
            height: 1000px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out, transform 6s linear;
            transform: scale(1.1);
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Player */
        .player-container h2 { margin-bottom: 15px; }
        audio { width: 100%; filter: invert(0.8) hue-rotate(240deg); }

        @media (max-width: 450px) {
            .timer-grid { grid-template-columns: repeat(2, 1fr); }
            .carousel { height: 650px; }
            .lua {
                width: 45px;
                height: 45px;
                top: 15vh;
                right: 40vw;
                box-shadow: inset 8px 0px 0px 0px #e0e0e0;
                animation: flutuarLua 6s ease-in-out infinite;
            }
        }

        /* Coração da Transição corrigido */
        #heart-transition {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%) scale(0);
            z-index: 2001;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #heart-transition svg {
            width: 100px;
            height: 100px;
            fill: var(--accent-color);
        }

        .expand-heart {
            animation: heartGrow 1.8s forwards cubic-bezier(0.95, 0.05, 0.795, 0.035);
        }

        @keyframes heartGrow {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(50); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(100); opacity: 0; }
        }
        @keyframes flutuarLua {
    0%, 100% { transform: rotate(-25deg) translateY(0px); }
    50% { transform: rotate(-20deg) translateY(-10px); }
}
    </style>
</head>
<body>
    <div id="star-container">
        <div class="lua"></div>
    </div>
    <div id="heart-transition">
    <svg viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>
    <div id="overlay">
        <h1>2 Anos de Nós 💜</h1>
        <button class="btn-entrar" onclick="iniciarTransicao()">Abrir Presente</button>
    </div>

    <main id="conteudo">
        <section class="glass-panel">
            <h1 id="titulo">Feliz Aniversário!</h1>
            <p class="message-text">
                "Desde o dia 05/05/2024, minha vida ganhou uma cor nova. Este é um pequeno espaço para lembrarmos de cada segundo que passamos juntos. Eu te amo!"
            </p>
        </section>

        <section class="glass-panel">
            <h2>Tempo ao seu lado:</h2>
            <div class="timer-grid">
                <div class="time-box"><span id="years">0</span><p>Anos</p></div>
                <div class="time-box"><span id="months">0</span><p>Meses</p></div>
                <div class="time-box"><span id="days">0</span><p>Dias</p></div>
                <div class="time-box"><span id="hours">0</span><p>Horas</p></div>
                <div class="time-box"><span id="minutes">0</span><p>Minutos</p></div>
                <div class="time-box"><span id="seconds">0</span><p>Segundos</p></div>
            </div>
        </section>

        <div class="carousel">
            <img src="foto1.jpg" class="slide active">
            <img src="foto2.jpg" class="slide">
            <img src="foto3.jpg" class="slide">
            <img src="foto4.jpg" class="slide">
            <img src="foto5.webp" class="slide">
            <img src="foto6.jpg" class="slide">
            <img src="foto7.jpg" class="slide">
            <img src="foto8.jpg" class="slide">
            <img src="foto9.jpg" class="slide">
            <img src="foto10.webp" class="slide">
            <img src="foto11.jpg" class="slide">
        </div>

        <section class="glass-panel player-container">
            <h2>Nossa Música</h2>
            <audio id="musica" loop controls>
                <source src="musica.mp3" type="audio/mpeg">
            </audio>
        </section>
    </main>

    <script>
        // 1. Configurações Globais
        const dataInicio = new Date('2024-05-05T00:00:00');
        let valoresAntigos = {};

        // 2. Gerar Céu e Lua
        function generateSky() {
            const starContainer = document.getElementById('star-container');
            const isMobile = window.innerWidth < 480;
            const starCount = isMobile ? 40 : 120;

            // Criar Lua
            const lua = document.createElement('div');
            lua.className = 'lua';
            lua.id = 'lua-id';
            starContainer.appendChild(lua);

            // Criar Estrelas
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                starContainer.appendChild(star);
            }

            // Iniciar corações da lua
            setInterval(criarCoracaoSaindoDaLua, 1500);
        }

        // 3. Efeito dos Corações da Lua (Versão Simplificada)
        function criarCoracaoSaindoDaLua() {
            const lua = document.getElementById('lua-id');
            if (!lua) return;

            const c = document.createElement('div');
            c.className = 'coracao-lua';
            c.innerHTML = '💜';
            
            // Começa no centro da lua
            c.style.left = '30px'; 
            c.style.top = '30px';
            
            lua.appendChild(c);

            // Direção aleatória
            const vx = (Math.random() - 0.5) * 2; // Para os lados
            const vy = Math.random() * 2 + 1;     // Para baixo
            let px = 30;
            let py = 30;
            let op = 1;

            const anima = setInterval(() => {
                px += vx;
                py += vy;
                op -= 0.01;
                
                c.style.left = px + 'px';
                c.style.top = py + 'px';
                c.style.opacity = op;

                if (op <= 0) {
                    clearInterval(anima);
                    c.remove();
                }
            }, 20);
        }

        // 4. Transição do Botão
        function iniciarTransicao() {
            const heart = document.getElementById('heart-transition');
            const overlay = document.getElementById('overlay');
            const main = document.getElementById('conteudo');
            const audio = document.getElementById('musica');

            heart.classList.add('expand-heart');
            overlay.style.opacity = '0';

            setTimeout(() => {
                overlay.style.display = 'none';
                main.style.display = 'flex';
                audio.play().catch(() => console.log("Áudio aguardando interação"));
                setTimeout(() => main.style.opacity = '1', 50);
            }, 1100);
        }

        // 5. Contador e Corações do Timer
        function criarCoracaoTimer(id) {
            const box = document.getElementById(id).parentElement;
            const h = document.createElement('div');
            h.className = 'heart-float';
            h.innerHTML = '💜';
            box.appendChild(h);
            setTimeout(() => h.remove(), 800);
        }

        function atualizarContador() {
            const agora = new Date();
            let anos = agora.getFullYear() - dataInicio.getFullYear();
            let meses = agora.getMonth() - dataInicio.getMonth();
            let dias = agora.getDate() - dataInicio.getDate();
            let horas = agora.getHours() - dataInicio.getHours();
            let minutos = agora.getMinutes() - dataInicio.getMinutes();
            let segundos = agora.getSeconds() - dataInicio.getSeconds();

            if (segundos < 0) { segundos += 60; minutos--; }
            if (minutos < 0) { minutos += 60; horas--; }
            if (horas < 0) { horas += 24; dias--; }
            if (dias < 0) {
                const mAnt = new Date(agora.getFullYear(), agora.getMonth(), 0);
                dias += mAnt.getDate(); meses--;
            }
            if (meses < 0) { meses += 12; anos--; }

            const vals = { years: anos, months: meses, days: dias, hours: horas, minutes: minutos, seconds: segundos };
            for (let k in vals) {
                const el = document.getElementById(k);
                if (el && vals[k] !== valoresAntigos[k]) {
                    el.innerText = vals[k];
                    if (valoresAntigos[k] !== undefined) criarCoracaoTimer(k);
                    valoresAntigos[k] = vals[k];
                }
            }
        }

        // 6. Carrossel
        let sIdx = 0;
        function carrossel() {
            const slides = document.querySelectorAll('.slide');
            if (slides.length > 0) {
                slides[sIdx].classList.remove('active');
                sIdx = (sIdx + 1) % slides.length;
                slides[sIdx].classList.add('active');
            }
        }

        // Inicializar tudo
        window.onload = () => {
            generateSky();
            setInterval(atualizarContador, 1000);
            atualizarContador();
            setInterval(carrossel, 4000);
        };
    </script>
</body>
</html>
