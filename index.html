<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Aniversário - 2 Anos</title>
    <style>
        :root {
            --text-color: #e0e0e0;
            --accent-color: #bb86fc; 
            --accent-glow: rgba(187, 134, 252, 0.6);
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(187, 134, 252, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Fundo com Estrelas Animadas */
        body {
            background: #0a0a0a;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            perspective: 1000px;
        }

        #star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1b1b2f 0%, #050505 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Tela de Entrada e Efeito Coração */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
        }

        /* Coração da Transição corrigido */
        #heart-transition {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%) scale(0);
            z-index: 2001;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #heart-transition svg {
            width: 100px;
            height: 100px;
            fill: var(--accent-color);
        }

        .expand-heart {
            animation: heartGrow 1.8s forwards cubic-bezier(0.95, 0.05, 0.795, 0.035);
        }

        @keyframes heartGrow {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(50); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(100); opacity: 0; }
        }

        .btn-entrar {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2002;
        }

        .btn-entrar:hover {
            background: var(--accent-color);
            color: #121212;
            box-shadow: 0 0 30px var(--accent-color);
        }

        /* Conteúdo Principal */
        main {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            visibility: hidden; /* Evita flash antes da animação */
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border-left: 4px solid var(--accent-color); /* Detalhe lateral */
        }

        h1, h2 {
            text-align: center;
            color: var(--accent-color);
            text-shadow: 0 0 15px var(--accent-glow);
            margin-bottom: 10px;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .time-box {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 5px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(187, 134, 252, 0.1);
        }

        .time-box span {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        /* Coração flutuante do contador */
        .heart-float {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 0);
            pointer-events: none;
            animation: heartUp 1s ease-out forwards;
        }

        @keyframes heartUp {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50px) scale(2); opacity: 0; }
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 1000px; /* Ajustado para melhor visualização mobile/desktop */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 1px solid var(--glass-border);
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active { opacity: 1; }

        audio { width: 100%; filter: invert(0.8) hue-rotate(240deg); margin-top: 10px; }

        @media (max-width: 450px) {
            .timer-grid { grid-template-columns: repeat(2, 1fr); }
            .carousel { height: 650px; }
        }
    </style>
</head>
<body>

    <div id="star-container"></div>
    <div id="heart-transition">
    <svg viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <div id="overlay">
        <h1 style="margin-bottom: 40px;">Nossos 2 Anos 💜</h1>
        <button class="btn-entrar" onclick="iniciarTransicao()">Abrir Presente</button>
    </div>

    <main id="conteudo">
        <section class="glass-panel">
            <h1>Feliz Aniversário!</h1>
            <p style="text-align: center; font-style: italic;">
                "Desde o dia 05/05/2024, cada segundo valeu a pena. Te amo!"
            </p>
        </section>

        <section class="glass-panel">
            <h2>Tempo ao seu lado</h2>
            <div class="timer-grid">
                <div class="time-box"><span id="years">0</span><p>Anos</p></div>
                <div class="time-box"><span id="months">0</span><p>Meses</p></div>
                <div class="time-box"><span id="days">0</span><p>Dias</p></div>
                <div class="time-box"><span id="hours">0</span><p>Horas</p></div>
                <div class="time-box"><span id="minutes">0</span><p>Minutos</p></div>
                <div class="time-box"><span id="seconds">0</span><p>Segundos</p></div>
            </div>
        </section>

        <div class="carousel">
            <img src="foto1.jpg" class="slide active">
            <img src="foto2.jpg" class="slide">
            <img src="foto3.jpg" class="slide">
            </div>

        <section class="glass-panel">
            <h2>Nossa Música</h2>
            <audio id="musica" loop controls>
                <source src="musica.mp3" type="audio/mpeg">
            </audio>
        </section>
    </main>

    <script>
        // Gerar Estrelas de Fundo
        const starContainer = document.getElementById('star-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starContainer.appendChild(star);
        }

        // Transição do Coração
        function iniciarTransicao() {
            const heart = document.getElementById('heart-transition');
            const overlay = document.getElementById('overlay');
            const main = document.getElementById('conteudo');
            const audio = document.getElementById('musica');

            heart.classList.add('expand-heart');
            overlay.style.opacity = '0';

            setTimeout(() => {
                overlay.style.display = 'none';
                main.style.visibility = 'visible';
                main.style.opacity = '1';
                audio.play().catch(() => console.log("Play manual necessário"));
            }, 1000);
        }

        // Lógica do Contador
        const dataInicio = new Date('2024-05-05T00:00:00');
        let valoresAntigos = {};

        function criarCoracao(id) {
            const box = document.getElementById(id).parentElement;
            const h = document.createElement('div');
            h.className = 'heart-float';
            h.innerHTML = '💜';
            box.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }

        function atualizar() {
            const agora = new Date();
            let anos = agora.getFullYear() - dataInicio.getFullYear();
            let meses = agora.getMonth() - dataInicio.getMonth();
            let dias = agora.getDate() - dataInicio.getDate();
            let horas = agora.getHours() - dataInicio.getHours();
            let minutos = agora.getMinutes() - dataInicio.getMinutes();
            let segundos = agora.getSeconds() - dataInicio.getSeconds();

            if (segundos < 0) { segundos += 60; minutos--; }
            if (minutes < 0) { minutes += 60; horas--; }
            if (hours < 0) { hours += 24; dias--; }
            if (dias < 0) {
                const mesAnterior = new Date(agora.getFullYear(), agora.getMonth(), 0);
                dias += mesAnterior.getDate();
                meses--;
            }
            if (meses < 0) { meses += 12; anos--; }

            const valores = { years: anos, months: meses, days: dias, hours: horas, minutes: minutos, seconds: segundos };
            for (let k in valores) {
                const el = document.getElementById(k);
                if (valores[k] !== valoresAntigos[k]) {
                    el.innerText = valores[k];
                    if (valoresAntigos[k] !== undefined) criarCoracao(k);
                    valoresAntigos[k] = valores[k];
                }
            }
        }
        setInterval(atualizar, 1000);
        atualizar();

        // Carrossel
        let idx = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[idx].classList.remove('active');
            idx = (idx + 1) % slides.length;
            slides[idx].classList.add('active');
        }, 4000);
    </script>
</body>
</html>
