<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nosso Aniversário - 2 Anos</title>
    <style>
        :root {
            --text-color: #e0e0e0;
            --accent-color: #bb86fc; 
            --accent-glow: rgba(187, 134, 252, 0.6);
            --glass-bg: rgba(25, 25, 25, 0.75);
            --glass-border: rgba(187, 134, 252, 0.3);
        }

        /* Reset para evitar scrolls fantasmas no mobile */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: #050505;
        }

        body {
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Fundo com Estrelas e Nebulosa */
        #star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #121212 0%, #050505 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Overlay Inicial */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #overlay h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* Transição do Coração Corrigida */
        #heart-transition {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%) scale(0);
            z-index: 2001;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #heart-transition svg {
            width: 100%;
            height: 100%;
            fill: var(--accent-color);
        }

        .expand-heart {
            animation: heartGrow 1.5s forwards ease-in;
        }

        @keyframes heartGrow {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(40); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(80); opacity: 0; }
        }

        .btn-entrar {
            padding: 16px 45px;
            font-size: 1.1rem;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(187, 134, 252, 0.2);
            -webkit-tap-highlight-color: transparent;
        }

        /* Conteúdo Principal */
        main {
            width: 90%;
            max-width: 500px;
            display: none; /* Alterado para display none para evitar bugs de layout inicial */
            flex-direction: column;
            gap: 20px;
            padding: 40px 0;
            z-index: 10;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .time-box {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 5px;
            border-radius: 12px;
        }

        .time-box span {
            display: block;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .time-box p { font-size: 0.65rem; color: #aaa; text-transform: uppercase; }

        .heart-float {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 0);
            pointer-events: none;
            animation: heartUp 0.8s ease-out forwards;
        }

        @keyframes heartUp {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -40px) scale(1.5); opacity: 0; }
        }

        .carousel {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slide.active { opacity: 1; }

        audio { width: 100%; margin-top: 10px; filter: hue-rotate(250deg) brightness(1.5); }

        /* Ajuste Mobile Específico */
        @media (max-width: 480px) {
            .timer-grid { grid-template-columns: repeat(2, 1fr); }
            #overlay h1 { font-size: 1.5rem; }
            .carousel { height: 350px; }
            .time-box span { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div id="star-container"></div>
    <div id="heart-transition">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>

    <div id="overlay">
        <h1>Nosso Momento 💜</h1>
        <button class="btn-entrar" onclick="iniciarTransicao()">Abrir Presente</button>
    </div>

    <main id="conteudo">
        <section class="glass-panel">
            <h2 style="font-size: 1.3rem;">Feliz Aniversário!</h2>
            <p style="font-style: italic; font-size: 0.95rem;">"Desde 05/05/2024, cada dia é um presente ao seu lado. Te amo!"</p>
        </section>

        <section class="glass-panel">
            <h2 style="font-size: 1.1rem; margin-bottom: 15px;">Tempo de História</h2>
            <div class="timer-grid">
                <div class="time-box"><span id="years">0</span><p>Anos</p></div>
                <div class="time-box"><span id="months">0</span><p>Meses</p></div>
                <div class="time-box"><span id="days">0</span><p>Dias</p></div>
                <div class="time-box"><span id="hours">0</span><p>Horas</p></div>
                <div class="time-box"><span id="minutes">0</span><p>Minutos</p></div>
                <div class="time-box"><span id="seconds">0</span><p>Segundos</p></div>
            </div>
        </section>

        <div class="carousel">
            <img src="foto1.jpg" class="slide active">
            <img src="foto2.jpg" class="slide">
            <img src="foto3.jpg" class="slide">
        </div>

        <section class="glass-panel">
            <h2 style="font-size: 1.1rem;">Nossa Música</h2>
            <audio id="musica" loop controls>
                <source src="musica.mp3" type="audio/mpeg">
            </audio>
        </section>
    </main>

    <script>
        // Estrelas otimizadas
        const starContainer = document.getElementById('star-container');
        const starCount = window.innerWidth < 480 ? 50 : 120;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starContainer.appendChild(star);
        }

        function iniciarTransicao() {
            const heart = document.getElementById('heart-transition');
            const overlay = document.getElementById('overlay');
            const main = document.getElementById('conteudo');
            const audio = document.getElementById('musica');

            heart.classList.add('expand-heart');
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';

            setTimeout(() => {
                overlay.style.display = 'none';
                main.style.display = 'flex';
                // Pequeno delay para o display flex não quebrar a transição de opacidade
                setTimeout(() => main.style.opacity = '1', 10);
                audio.play().catch(() => console.log("Play manual"));
            }, 1100);
        }

        // Lógica do Contador
        const dataInicio = new Date('2024-05-05T00:00:00');
        let valoresAntigos = {};

        function criarCoracao(id) {
            const box = document.getElementById(id).parentElement;
            const h = document.createElement('div');
            h.className = 'heart-float';
            h.innerHTML = '💜';
            box.appendChild(h);
            setTimeout(() => h.remove(), 800);
        }

        function atualizar() {
            const agora = new Date();
            let anos = agora.getFullYear() - dataInicio.getFullYear();
            let meses = agora.getMonth() - dataInicio.getMonth();
            let dias = agora.getDate() - dataInicio.getDate();
            let horas = agora.getHours() - dataInicio.getHours();
            let minutos = agora.getMinutes() - dataInicio.getMinutes();
            let segundos = agora.getSeconds() - dataInicio.getSeconds();

            if (segundos < 0) { segundos += 60; minutos--; }
            if (minutos < 0) { minutes += 60; hours--; }
            if (hours < 0) { hours += 24; dias--; }
            if (dias < 0) {
                const mesAnterior = new Date(agora.getFullYear(), agora.getMonth(), 0);
                dias += mesAnterior.getDate();
                meses--;
            }
            if (meses < 0) { meses += 12; anos--; }

            const valores = { years: anos, months: meses, days: dias, hours: horas, minutes: minutos, seconds: segundos };
            for (let k in valores) {
                const el = document.getElementById(k);
                if (el && valores[k] !== valoresAntigos[k]) {
                    el.innerText = valores[k];
                    if (valoresAntigos[k] !== undefined) criarCoracao(k);
                    valoresAntigos[k] = valores[k];
                }
            }
        }
        setInterval(atualizar, 1000);
        atualizar();

        // Carrossel
        let idx = 0;
        const slides = document.querySelectorAll('.slide');
        if(slides.length > 0) {
            setInterval(() => {
                slides[idx].classList.remove('active');
                idx = (idx + 1) % slides.length;
                slides[idx].classList.add('active');
            }, 4000);
        }
    </script>
</body>
</html>
